<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOROSOK Premium | USMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e1b4b, #0f111a);
            color: white;
            padding-bottom: 40px;
        }

        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 0 15px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .content { text-align: left; }
        .glass-card h3 { font-size: 1.05rem; margin: 0; font-weight: 700; }
        .glass-card p { color: #94a3b8; font-size: 0.8rem; margin: 2px 0 0; }

        .wa-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25d366;
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            z-index: 100;
            transition: 0.3s;
        }
        .wa-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
